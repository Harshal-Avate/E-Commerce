<h1>Your Cart</h1>

{% for product in products %}

<div>

    <h2>{{ product.name }}</h2>

    <p>Price: ₹{{ product.price }}</p>
    <a href="/products/cart/remove/{{ product.id }}/">Remove</a>

    {% if product.image %}
    <img src="{{ product.image.url }}" width="150">
    {% endif %}

</div>

<hr>

{% empty %}

<p>Your cart is empty</p>

{% endfor %}
