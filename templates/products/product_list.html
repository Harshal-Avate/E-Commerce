<h1>Products</h1>

{% for product in products %}

<div>

    <h2>
        <h2>Cart ({{ cart_count }})</h2>
        <a href="/products/cart/">View Cart</a>
        <a href="/products/{{ product.id }}/">
            <h2>{{ produc.t.name }}</h2>
        </a>
    </h2>

    <img src="{{ product.image.url }}" width="200">
    <a href="/products/cart/add/{{ product.id }}/">Add To Cart</a>
    <p>Price: ₹{{ product.price }}</p>
    <p>{{ product.description }}</p>
    <p>Stock: {{ product.stock }}</p>

</div>

<hr>

{% endfor %}
