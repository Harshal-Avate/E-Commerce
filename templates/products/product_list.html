<h1>Products</h1>

{% for product in products %}

<div>

<h2>
<a href="/products/{{ product.id }}/">
{{ product.name }}
</a>
</h2>

<img src="{{ product.image.url }}" width="200">
<p>Price: ₹{{ product.price }}</p>
<p>{{ product.description }}</p>
<p>Stock: {{ product.stock }}</p>

</div>

<hr>

{% endfor %}
